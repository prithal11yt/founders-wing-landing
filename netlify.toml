[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Force all traffic to www (canonical domain matches GSC property)
[[redirects]]
  from = "https://founderswing.com/*"
  to = "https://www.founderswing.com/:splat"
  status = 301
  force = true
